name: AgilityPro — Reminder Serale

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Leggi lezioni da Firestore e manda notifica OneSignal
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_USER_UID: ${{ secrets.FIREBASE_USER_UID }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, os, calendar
          from datetime import datetime, timedelta, timezone

          ONESIGNAL_APP_ID = os.environ['ONESIGNAL_APP_ID']
          ONESIGNAL_API_KEY = os.environ['ONESIGNAL_API_KEY']
          PROJECT_ID = os.environ['FIREBASE_PROJECT_ID']
          API_KEY = os.environ['FIREBASE_API_KEY']
          USER_UID = os.environ['FIREBASE_USER_UID']

          base = f'https://firestore.googleapis.com/v1/projects/{PROJECT_ID}/databases/(default)/documents'

          def get_field(doc, field):
            f = doc.get('fields', {}).get(field, {})
            for t in ['stringValue','integerValue','booleanValue']:
              if t in f: return f[t]
            return None

          def get_docs(path):
            try:
              url = f'{base}/{path}?key={API_KEY}&pageSize=200'
              with urllib.request.urlopen(url, timeout=10) as r:
                return json.loads(r.read()).get('documents', [])
            except Exception as e:
              print(f'Errore {path}: {e}')
              return []

          # Leggi impostazioni da Firestore
          cfg = {'attive': True, 'ora': '20:00', 'giorni': 1, 'lastSent': ''}
          try:
            url = f'{base}/users/{USER_UID}/impostazioni/notifiche?key={API_KEY}'
            with urllib.request.urlopen(url, timeout=10) as r:
              doc = json.loads(r.read())
              cfg['attive'] = get_field(doc, 'attive') or False
              cfg['ora'] = get_field(doc, 'ora') or '20:00'
              cfg['giorni'] = int(get_field(doc, 'giorni') or 1)
              cfg['lastSent'] = get_field(doc, 'lastSent') or ''
              print(f'Impostazioni lette: {cfg}')
          except Exception as e:
            print(f'Impostazioni non trovate, uso default: {e}')

          if not cfg['attive']:
            print('Reminder disattivati, skip.')
            exit(0)

          # Ora italiana (UTC+1 inverno, UTC+2 estate)
          now_utc = datetime.now(timezone.utc)
          def is_dst(dt):
            year = dt.year
            mar = max(week[-1] for week in calendar.monthcalendar(year, 3))
            oct_last = max(week[-1] for week in calendar.monthcalendar(year, 10))
            start = datetime(year, 3, mar, 1, tzinfo=timezone.utc)
            end = datetime(year, 10, oct_last, 1, tzinfo=timezone.utc)
            return start <= dt < end
          offset = 2 if is_dst(now_utc) else 1
          now_it = now_utc + timedelta(hours=offset)
          ora_corrente = now_it.strftime('%H:%M')
          oggi_str = now_it.strftime('%Y-%m-%d')
          print(f'Ora italiana: {ora_corrente}, orario reminder: {cfg["ora"]}')

          # Controlla se e il momento giusto (tolleranza 30 min)
          def t2m(t):
            h, m = map(int, t.split(':'))
            return h * 60 + m
          if abs(t2m(ora_corrente) - t2m(cfg['ora'])) > 90:
            print(f'Non ancora il momento, skip.')
            exit(0)

          # Evita duplicati
          if cfg['lastSent'] == oggi_str:
            print(f'Notifica gia inviata oggi, skip.')
            exit(0)

          # Data target
          target = now_it + timedelta(days=cfg['giorni'])
          target_str = target.strftime('%Y-%m-%d')
          mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno',
                  'luglio','agosto','settembre','ottobre','novembre','dicembre']
          giorni_sett = ['lunedi','martedi','mercoledi','giovedi','venerdi','sabato','domenica']
          target_label = giorni_sett[target.weekday()] + ' ' + str(target.day) + ' ' + mesi[target.month-1]

          # Leggi appuntamenti e iscritti
          appuntamenti = get_docs(f'users/{USER_UID}/appuntamenti')
          iscritti_docs = get_docs(f'users/{USER_UID}/iscritti')
          iscritti = {str(get_field(d,'id') or d['name'].split('/')[-1]): d for d in iscritti_docs}

          lezioni = [a for a in appuntamenti if get_field(a,'data') == target_str and get_field(a,'stato') != 'saltata']
          lezioni.sort(key=lambda a: get_field(a,'ora') or '00:00')

          if not lezioni:
            titolo = 'AgilityPro'
            corpo = f'Nessuna lezione {target_label}. Giornata libera!'
          else:
            n = len(lezioni)
            titolo = f'AgilityPro - {n} lezione{"i" if n>1 else ""} {target_label}'
            righe = []
            for a in lezioni:
              ora = get_field(a,'ora') or '?'
              isc = iscritti.get(str(get_field(a,'iscrittoId') or ''))
              nome = get_field(isc,'nome') if isc else '?'
              cane = get_field(isc,'cane') if isc else '?'
              rec = ' (recupero)' if get_field(a,'recuperoDi') else ''
              righe.append(f'{ora} - {nome} & {cane}{rec}')
            corpo = '\n'.join(righe)

          print(f'Titolo: {titolo}')
          print(f'Corpo: {corpo}')

          # Manda notifica OneSignal
          payload = json.dumps({
            'app_id': ONESIGNAL_APP_ID,
            'included_segments': ['All'],
            'headings': {'it': titolo, 'en': titolo},
            'contents': {'it': corpo, 'en': corpo},
            'url': 'https://simonegreco1994.github.io/',
          }).encode()
          req = urllib.request.Request(
            'https://api.onesignal.com/notifications',
            data=payload,
            headers={'Content-Type': 'application/json', 'Authorization': f'Key {ONESIGNAL_API_KEY}'}
          )
          with urllib.request.urlopen(req, timeout=10) as r:
            result = json.loads(r.read())
            print(f'Risultato OneSignal: {result}')

          # Salva lastSent su Firestore
          try:
            patch_url = f'{base}/users/{USER_UID}/impostazioni/notifiche?key={API_KEY}&updateMask.fieldPaths=lastSent'
            patch_body = json.dumps({'fields': {'lastSent': {'stringValue': oggi_str}}}).encode()
            patch_req = urllib.request.Request(patch_url, data=patch_body, method='PATCH',
              headers={'Content-Type': 'application/json'})
            with urllib.request.urlopen(patch_req, timeout=10) as r:
              print(f'lastSent aggiornato: {oggi_str}')
          except Exception as e:
            print(f'Errore aggiornamento lastSent: {e}')
          PYEOF
